<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Forza Quattro</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #1e1e2f;
        color: white;
    }

    h1 {
        margin-top: 20px;
    }

    #board {
        display: grid;
        grid-template-columns: repeat(7, 70px);
        gap: 5px;
        justify-content: center;
        margin-top: 20px;
        background: #0044cc;
        padding: 10px;
        border-radius: 10px;
    }

    .cell {
        width: 70px;
        height: 70px;
        background: #111;
        border-radius: 50%;
        cursor: pointer;
    }

    .red {
        background: red;
    }

    .yellow {
        background: yellow;
    }

    #status {
        margin-top: 20px;
        font-size: 18px;
    }
</style>
</head>
<body>

<h1>Forza Quattro</h1>
<div id="board"></div>
<div id="status">Turno: Rosso</div>

<script>
const ROWS = 6;
const COLS = 7;
let board = [];
let currentPlayer = "red";
let gameOver = false;

const boardDiv = document.getElementById("board");
const statusDiv = document.getElementById("status");

// Inizializza griglia
function initBoard() {
    board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    boardDiv.innerHTML = "";

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.dataset.col = c;
            cell.addEventListener("click", handleClick);
            boardDiv.appendChild(cell);
        }
    }
}

// Gestione click
function handleClick(e) {
    if (gameOver) return;

    const col = parseInt(e.target.dataset.col);

    for (let r = ROWS - 1; r >= 0; r--) {
        if (!board[r][col]) {
            board[r][col] = currentPlayer;
            updateUI();

            if (checkWin(r, col)) {
                statusDiv.textContent = (currentPlayer === "red" ? "Rosso" : "Giallo") + " vince!";
                gameOver = true;
                return;
            }

            if (isDraw()) {
                statusDiv.textContent = "Pareggio!";
                gameOver = true;
                return;
            }

            currentPlayer = currentPlayer === "red" ? "yellow" : "red";
            statusDiv.textContent = "Turno: " + (currentPlayer === "red" ? "Rosso" : "Giallo");
            return;
        }
    }
}

// Aggiorna UI
function updateUI() {
    const cells = document.querySelectorAll(".cell");

    cells.forEach((cell, index) => {
        const r = Math.floor(index / COLS);
        const c = index % COLS;
        cell.classList.remove("red", "yellow");

        if (board[r][c]) {
            cell.classList.add(board[r][c]);
        }
    });
}

// Controllo vittoria
function checkWin(row, col) {
    const directions = [
        [1, 0], [0, 1], [1, 1], [1, -1]
    ];

    return directions.some(([dr, dc]) => {
        let count = 1;

        count += countDir(row, col, dr, dc);
        count += countDir(row, col, -dr, -dc);

        return count >= 4;
    });
}

function countDir(r, c, dr, dc) {
    let count = 0;
    let player = board[r][c];

    r += dr;
    c += dc;

    while (
        r >= 0 && r < ROWS &&
        c >= 0 && c < COLS &&
        board[r][c] === player
    ) {
        count++;
        r += dr;
        c += dc;
    }

    return count;
}

// Pareggio
function isDraw() {
    return board[0].every(cell => cell !== null);
}

// Avvio
initBoard();
</script>

</body>
</html>
